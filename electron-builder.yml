# ── Packaging configuration (electron-builder) ──
# Turns the built code into a double-clickable macOS app inside a .dmg
# installer. Run with `npm run dist:mac` (unsigned) or `npm run release:mac`
# (signed + notarized + zip for auto-updates).
appId: com.arco.desktop
productName: Arco

directories:
    # Icons and other packaging assets live here (e.g. build/icon.icns).
    buildResources: build

# Only ship the compiled output + the manifest. Source/dev files are excluded.
files:
    - out/**/*
    - package.json

# Ship the generated migration SQL files alongside the app (into
# Contents/Resources/drizzle). The app reads these at startup to migrate the
# user's database — see electron/services/db/client.ts (`migrationsFolder`).
extraResources:
    - from: drizzle
      to: drizzle

# `better-sqlite3` ships a native binary (.node). Native binaries CANNOT be
# loaded from inside Electron's compressed "asar" archive, so we unpack them
# to a real folder on disk. Without this the database fails to open in the
# packaged app.
asarUnpack:
    - '**/*.node'
    - node_modules/better-sqlite3/**

# Packaging configuration for macOS
# supports only Silicon Macs
mac:
    category: public.app-category.productivity
    target:
        # `dmg` is the user-facing installer. `zip` is what electron-updater
        # downloads for auto-updates on macOS — both are required for releases.
        - target: dmg
          arch: arm64
        - target: zip
          arch: arm64
    # Hardened runtime is required for notarization. The entitlements file
    # below grants Electron + better-sqlite3 the exemptions they need to run
    # under it (JIT, unsigned executable memory, dyld env vars).
    hardenedRuntime: true
    gatekeeperAssess: false
    entitlements: build/entitlements.mac.plist
    entitlementsInherit: build/entitlements.mac.plist
    # Notarization via @electron/notarize, using an App Store Connect API key.
    # In electron-builder v26 `notarize` is a boolean — Team ID and key info
    # are read from env vars at build time (see .env.release.example):
    #   APPLE_API_KEY, APPLE_API_KEY_ID, APPLE_API_ISSUER, APPLE_TEAM_ID
    notarize: true

# Packaging configuration for macOS DMG
# supports only Silicon Macs
dmg:
    # The familiar "drag the app into Applications" installer window.
    contents:
        - x: 130
          y: 220
          type: file
        - x: 410
          y: 220
          type: link
          path: /Applications

# Auto-update publish target. `provider: generic` means electron-updater fetches
# `latest-mac.yml` (and the matching .zip) from this URL at runtime. The URL
# points at the public Cloudflare R2 bucket; uploads happen via the
# scripts/upload-release.sh helper.
publish:
    provider: generic
    url: https://updates.arco.chat
    channel: latest
